name: Auto Monitor and Update M3U8 Tokens

on:
  schedule:
    - cron: '*/15 * * * *' # প্রতি ১৫ মিনিট পর পর চেক করবে
  workflow_dispatch: # চাইলে GitHub প্যানেল থেকে ম্যানুয়ালি রান করার জন্য

permissions:
  contents: write # রিপোজিটরিতে ফাইল সেভ বা পুশ করার পারমিশন

jobs:
  monitor-tokens:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper

      - name: Run Token Monitor Script
        run: python update_m3u.py

      - name: Commit and Push Changes (If Any)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add playlist.m3u
          
          # যদি স্ক্রিপ্ট নতুন টোকেন আপডেট করে, তবেই কমিট এবং পুশ করবে। 
          # কোনো লিংক আপডেট না হলে স্কিপ করে যাবে।
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-refreshed expired m3u8 tokens" && git push)
